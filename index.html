<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--accent:#00c9a7;--accent2:#00897b;--accent-glow:rgba(0,201,167,0.1);
--strava:#ff7043;--strava-glow:rgba(255,112,67,0.1);
--danger:#ef4444;--radius:14px;--radius-sm:10px;
--bg:#0f1923;--surface:#172030;--surface2:#1e2a3a;
--border:#263245;--text:#edf2f7;--text2:#7b8fa3;
}
@media(prefers-color-scheme:light){:root{
--bg:#f4f6f8;--surface:#ffffff;--surface2:#eef1f5;
--border:rgba(0,0,0,0.08);--text:#1a2030;--text2:#5c6a7a;
--accent:#00a88e;--accent-glow:rgba(0,168,142,0.08);--strava-glow:rgba(255,112,67,0.06);
}
.btn-primary,.send-btn,.sub-tab.active,.yr-sel-btn.active{color:#fff}
}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}
.app{max-width:480px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
.hide{display:none!important}

/* Tab Bar */
.tab-bar{display:flex;justify-content:space-around;padding:8px 0 max(12px,env(safe-area-inset-bottom));background:var(--surface);border-top:0.5px solid var(--border);flex-shrink:0}
.tab{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--text2);font-size:10px;font-family:inherit;cursor:pointer;padding:4px 8px}
.tab.active{color:var(--accent)}
.tab svg{width:22px;height:22px}
.app-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.page{display:none;min-height:100%}.page.active{display:block}

/* Buttons */
.btn-primary{padding:12px 24px;border-radius:var(--radius-sm);background:var(--accent);color:#0f1923;font-weight:700;font-size:14px;border:none;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:8px}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-secondary{padding:12px 24px;border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);font-weight:500;font-size:14px;border:1px solid var(--border);cursor:pointer;font-family:inherit}
.btn-strava{width:100%;padding:12px;border-radius:var(--radius-sm);background:var(--strava);color:#fff;font-weight:700;font-size:14px;border:none;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:14px}

/* Auth */
.auth-page{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;text-align:center;min-height:100vh;gap:14px}
.auth-page h2{font-size:24px;font-weight:700}
.auth-page p{color:var(--text2);font-size:14px;line-height:1.6;max-width:300px}
.auth-form{width:100%;max-width:300px;display:flex;flex-direction:column;gap:10px}
.auth-input,.api-input{width:100%;padding:14px 16px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:15px;font-family:inherit;outline:none}
.auth-input:focus,.api-input:focus{border-color:var(--accent)}
.auth-error{color:var(--danger);font-size:13px}
.auth-switch{color:var(--text2);font-size:13px}
.auth-switch button{background:none;border:none;color:var(--accent);font-weight:600;cursor:pointer;font-family:inherit;font-size:13px}
.api-setup{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;text-align:center;min-height:100vh;gap:14px}
.api-setup h2{font-size:22px;font-weight:700}
.api-setup p{color:var(--text2);font-size:14px;line-height:1.6;max-width:320px}
.api-input{max-width:320px;font-family:'Space Mono',monospace;font-size:13px}

/* Dashboard */
.dashboard{padding:16px 16px 20px}
.dash-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.greet-sub{display:block;font-size:14px;color:var(--text2)}
.greet-name{display:block;font-size:22px;font-weight:700;margin-top:1px}
.badge{font-size:11px;padding:5px 14px;border-radius:20px;background:var(--accent-glow);color:var(--accent);font-weight:600}
.yr-sel{display:flex;background:var(--surface);border-radius:24px;padding:3px;margin-bottom:16px}
.yr-sel-btn{flex:1;padding:8px;text-align:center;font-size:13px;font-weight:600;background:transparent;border:none;border-radius:20px;color:var(--text2);cursor:pointer;font-family:inherit}
.yr-sel-btn.active{background:var(--accent);color:#0f1923}
.sec-label{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin:12px 0 6px}
.week-row{display:flex;gap:6px;margin-bottom:8px}
.week-box{flex:1;background:var(--surface2);border-radius:10px;padding:10px;text-align:center}
.week-val{font-size:18px;font-weight:700;font-family:'Space Mono',monospace}
.week-lbl{font-size:10px;color:var(--text2);text-transform:uppercase;margin-top:2px}
.yr-card{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;padding:16px;text-align:center;margin-bottom:8px}
.yr-km{font-size:36px;font-weight:700;font-family:'Space Mono',monospace;color:var(--accent)}
.yr-km-lbl{font-size:12px;color:var(--text2);margin-top:2px}
.yr-stats{display:flex;justify-content:center;gap:20px;margin-top:12px}
.yr-stat{font-size:16px;font-weight:700;font-family:'Space Mono',monospace}
.yr-stat-lbl{font-size:12px;color:var(--text2);margin-left:4px}
.yr-div{width:0.5px;background:var(--border)}
.rec-card{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px}
.rec-row{display:flex;align-items:center;gap:10px;padding:8px 0;cursor:pointer}
.rec-row:not(:last-child){border-bottom:0.5px solid var(--border)}
.rec-dist{font-size:13px;font-weight:600;min-width:45px}
.rec-time{font-size:16px;font-weight:700;font-family:'Space Mono',monospace;color:var(--accent)}
.rec-date{font-size:11px;color:var(--text2);margin-left:auto}
.rec-detail{padding:8px 0 4px;font-size:12px;color:var(--text2);border-bottom:0.5px solid var(--border)}
.ri{display:flex;align-items:center;gap:10px;padding:12px;background:var(--surface);border-radius:10px;border-left:3px solid var(--accent);margin-bottom:6px}
.ri.hard{border-left-color:var(--strava)}
.ri-name{font-size:14px;font-weight:600}
.ri-stats{font-size:12px;color:var(--text2);margin-top:1px}
.ri-ago{font-size:11px;color:var(--text2);font-family:'Space Mono',monospace;flex-shrink:0}

/* Utforsk */
.explore{padding:20px 16px}
.explore-title{font-size:24px;font-weight:700;margin-bottom:20px}
.explore-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.explore-card{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:border-color .2s}
.explore-card:hover{border-color:var(--accent)}
.explore-emoji{font-size:22px;margin-bottom:8px}
.explore-card-title{font-size:15px;font-weight:600;margin-bottom:4px}
.explore-card-sub{font-size:12px;color:var(--text2)}
.detail-page{padding:20px 16px}
.detail-title{font-size:22px;font-weight:700;margin:14px 0 16px}
.back-btn{background:none;border:none;color:var(--accent);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;padding:4px 0}
.chart-card{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px}
.chart-title{font-size:14px;font-weight:700;color:var(--text2);margin-bottom:12px}

/* Shoe cards */
.shoe-card{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px}
.shoe-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.shoe-thumb{width:50px;height:50px;border-radius:10px;object-fit:cover;flex-shrink:0}
.shoe-thumb-ph{width:50px;height:50px;border-radius:10px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.shoe-name{font-weight:700;font-size:15px}
.shoe-type{font-size:12px;color:var(--text2);margin-top:2px}
.shoe-stats{display:flex;justify-content:space-around;padding-top:12px;border-top:0.5px solid var(--border)}
.shoe-stat-v{font-size:18px;font-weight:700;font-family:'Space Mono',monospace;color:var(--accent)}
.shoe-stat-l{font-size:10px;color:var(--text2);text-transform:uppercase;margin-top:2px}
.shoe-menu-btn{background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;padding:4px 8px;margin-left:auto}
.shoe-actions{display:flex;gap:6px;padding-top:8px;border-top:0.5px solid var(--border);margin-top:8px}
.shoe-actions button{flex:1;padding:8px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:12px;cursor:pointer;font-family:inherit}

/* Forms */
.form-card{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px}
.form-card label{display:block;font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;margin-top:14px}
.form-card label:first-child{margin-top:0}
.form-card input,.form-card select,.form-card textarea{width:100%;padding:12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;font-family:inherit;outline:none}
.form-card input:focus,.form-card select:focus{border-color:var(--accent)}
.form-card textarea{min-height:60px;resize:vertical}
.form-actions{display:flex;gap:10px;margin-top:16px;justify-content:flex-end}
.feel-row{display:flex;gap:8px}
.feel-btn{flex:1;padding:10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:13px;cursor:pointer;font-family:inherit}
.feel-btn.sel{border-color:var(--accent);background:var(--accent-glow)}

/* Photo */
.photo-up{cursor:pointer;border:2px dashed var(--border);border-radius:var(--radius-sm);overflow:hidden}
.photo-up:hover{border-color:var(--accent)}
.photo-ph{display:flex;flex-direction:column;align-items:center;gap:8px;padding:20px;color:var(--text2);font-size:13px}
.shoe-preview{width:100%;max-height:180px;object-fit:cover;display:block}

/* Settings */
.settings{padding:20px 16px}
.settings-title{font-size:22px;font-weight:700;margin-bottom:20px}
.settings-row{display:flex;align-items:center;gap:14px;width:100%;padding:16px;background:var(--surface);border:0.5px solid var(--border);border-radius:12px;cursor:pointer;font-family:inherit;color:var(--text);text-align:left;margin-bottom:10px}
.settings-row:hover{border-color:var(--accent)}
.settings-row svg{width:22px;height:22px;color:var(--accent);flex-shrink:0}
.s-title{font-weight:700;font-size:15px}
.s-sub{font-size:13px;color:var(--text2)}
.s-arrow{margin-left:auto;color:var(--text2)}
.logout-btn{margin-top:20px;width:100%;padding:12px;border-radius:var(--radius-sm);background:transparent;color:var(--danger);font-weight:600;font-size:14px;border:1px solid rgba(239,68,68,.2);cursor:pointer;font-family:inherit}
.reset-btn{margin-top:10px;width:100%;padding:12px;border-radius:var(--radius-sm);background:rgba(239,68,68,.1);color:var(--danger);font-weight:600;font-size:14px;border:1px solid rgba(239,68,68,.2);cursor:pointer;font-family:inherit}

/* Strava setup */
.strava-setup{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;padding:16px;margin-top:12px}
.strava-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.strava-hdr h3{font-size:18px;font-weight:700}
.strava-logo{color:var(--strava)}
.strava-logo svg{width:24px;height:24px}
.strava-status{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;margin-bottom:14px}
.strava-status.ok{background:var(--accent-glow);color:var(--accent)}
.strava-status.err{background:rgba(239,68,68,.1);color:var(--danger)}
.strava-form label{display:block;font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;margin-top:12px}
.strava-form label:first-child{margin-top:0}
.strava-form input{width:100%;padding:12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;font-family:inherit;outline:none}
.strava-form input:focus{border-color:var(--strava)}
.guide-step{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;font-size:13px;color:var(--text2);line-height:1.5}
.guide-step strong{color:var(--text)}
.step-num{flex-shrink:0;width:22px;height:22px;border-radius:50%;background:var(--accent-glow);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.guide-url{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:11px;font-family:'Space Mono',monospace;color:var(--text2);word-break:break-all;line-height:1.5;margin:4px 0 8px 32px}
.guide-url strong{color:var(--strava)}

/* Add btn */
.add-btn{width:100%;justify-content:center;padding:10px 20px;font-size:13px;margin-bottom:14px}

/* Onboarding inline */
.ob-card{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;padding:20px;margin-bottom:14px}
.ob-label{font-size:20px;font-weight:700;margin-bottom:16px}
.ob-input{width:100%;padding:14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:16px;font-family:inherit;outline:none}
.ob-input:focus{border-color:var(--accent)}
.ob-opts{display:flex;flex-direction:column;gap:8px}
.ob-opt{text-align:left;padding:14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:14px;cursor:pointer;font-family:inherit}
.ob-opt.sel{border-color:var(--accent);background:var(--accent-glow)}
.ob-nav{display:flex;gap:12px;margin-top:20px;justify-content:flex-end}
.ob-dots{display:flex;gap:6px;margin-bottom:20px}
.ob-dot{flex:1;height:4px;border-radius:2px;background:var(--border)}
.ob-dot.on{background:var(--accent)}

.empty{text-align:center;padding:40px 20px;color:var(--text2);font-size:14px}
</style>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import{getAuth,onAuthStateChanged,signInWithEmailAndPassword,createUserWithEmailAndPassword,signOut}from"https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import{getFirestore,doc,getDoc,setDoc}from"https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
const fb=initializeApp({apiKey:"AIzaSyDqPXbj-xGCLJtU_vtYU0lGw0ON10Ym75k",authDomain:"tempoki-fedf7.firebaseapp.com",projectId:"tempoki-fedf7",storageBucket:"tempoki-fedf7.firebasestorage.app",messagingSenderId:"226494629478",appId:"1:226494629478:web:c77aa7449d9832a447cfa7"});
const auth=getAuth(fb),dbs=getFirestore(fb);
window.fbAuth=auth;window.fbDb=dbs;window.fbDoc=doc;window.fbGetDoc=getDoc;window.fbSetDoc=setDoc;

<body>
<div class="app" id="app"></div>
<script>
// ─── State ───
const LS=k=>JSON.parse(localStorage.getItem('rc_'+k)||'null');
const SS=(k,v)=>{localStorage.setItem('rc_'+k,JSON.stringify(v));dbSave()};
let _st;function dbSave(){clearTimeout(_st);_st=setTimeout(saveToCloud,1500)}

async function saveToCloud(){
  const u=window.currentUser;if(!u)return;
  try{await window.fbSetDoc(window.fbDoc(window.fbDb,'users',u.uid),{
    apiKey:state.apiKey,profile:state.profile,profileDone:state.profileDone,
    stravaCreds:state.stravaCreds,stravaActivities:state.stravaActivities,
    shoes:state.shoes,shoeMap:state.shoeMap,method:state.method,
    updatedAt:new Date().toISOString()
  },{merge:true})}catch(e){console.error('Save err:',e)}
}
async function loadFromCloud(uid){
  try{const s=await window.fbGetDoc(window.fbDoc(window.fbDb,'users',uid));
  if(s.exists()){const d=s.data();
    ['apiKey','profile','profileDone','stravaCreds','stravaActivities','shoes','shoeMap','method'].forEach(k=>{
      if(d[k]!==undefined){state[k]=d[k];localStorage.setItem('rc_'+k,JSON.stringify(d[k]))}
    })
  }else if(state.apiKey||state.profileDone){await saveToCloud()}}catch(e){console.error('Load err:',e)}
}

let state={
  authLoading:true,authMode:'login',authError:'',
  apiKey:LS('apiKey')||'',profile:LS('profile')||{logs:[]},profileDone:LS('profileDone')||false,
  tab:'home',selectedYear:new Date().getFullYear(),
  stravaCreds:LS('stravaCreds')||{clientId:'',clientSecret:'',refreshToken:''},
  stravaActivities:LS('stravaActivities')||[],stravaStatus:'disconnected',
  shoes:LS('shoes')||[],shoeMap:LS('shoeMap')||{},
  showShoeForm:false,shoeForm:{name:'',type:'Asfalt',photo:'',manualKm:0,manualRuns:0},
  editingShoeId:null,editingProfile:false,onboardingStep:0,onboardingForm:{},
  exploreView:null,recDetail:null,
  showLogForm:false,logForm:{date:new Date().toISOString().slice(0,10),type:'Rolig løp',distance:'',duration:'',feeling:'Ok',notes:'',shoeId:''},
  activeActivity:null
};

// ─── SVG Icons ───
const I={
  home:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="2"/><path d="M7 21l3-7 2.5 2L16 10"/><path d="M16 10l2 7"/><path d="M7 21h10"/></svg>',
  search:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>',
  list:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>',

// ─── Strava ───
function fmtA(a){
  const d=new Date(a.start_date_local).toISOString().slice(0,10),km=(a.distance/1000).toFixed(1),mins=Math.round(a.moving_time/60);
  const pr=a.distance>0?a.moving_time/60/(a.distance/1000):0,pm=Math.floor(pr),ps=Math.round((pr-pm)*60).toString().padStart(2,'0');
  return{date:d,name:a.name,km,mins,pace:`${pm}:${ps}`,hr:a.average_heartrate?Math.round(a.average_heartrate):null,maxHr:a.max_heartrate?Math.round(a.max_heartrate):null,elev:Math.round(a.total_elevation_gain),type:a.type,id:a.id};
}
async function stravaFetchAll(token){
  let all=[],pg=1;
  while(true){const r=await fetch(`https://www.strava.com/api/v3/athlete/activities?per_page=200&page=${pg}`,{headers:{Authorization:`Bearer ${token}`}});if(!r.ok)break;const b=await r.json();if(!b.length)break;all=all.concat(b);if(b.length<200)break;pg++}
  return all;
}
async function stravaConnect(c){
  state.stravaStatus='connecting';render();
  try{
    let r=await fetch('https://www.strava.com/oauth/token',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({client_id:c.clientId,client_secret:c.clientSecret,code:c.code,grant_type:'authorization_code'})});
    let d;if(r.ok){d=await r.json()}else{r=await fetch('https://www.strava.com/oauth/token',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({client_id:c.clientId,client_secret:c.clientSecret,refresh_token:c.code,grant_type:'refresh_token'})});if(!r.ok)throw 0;d=await r.json()}
    state.stravaCreds={clientId:c.clientId,clientSecret:c.clientSecret,refreshToken:d.refresh_token};SS('stravaCreds',state.stravaCreds);
    state.stravaActivities=await stravaFetchAll(d.access_token);SS('stravaActivities',state.stravaActivities);state.stravaStatus='connected';
  }catch(e){state.stravaStatus='error'}render();
}
async function stravaRefresh(){
  const c=state.stravaCreds;if(!c.refreshToken)return;
  try{const d=await(await fetch('https://www.strava.com/oauth/token',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({client_id:c.clientId,client_secret:c.clientSecret,refresh_token:c.refreshToken,grant_type:'refresh_token'})})).json();
    c.refreshToken=d.refresh_token;SS('stravaCreds',c);
    state.stravaActivities=await stravaFetchAll(d.access_token);SS('stravaActivities',state.stravaActivities);state.stravaStatus='connected';render();
  }catch(e){console.error(e)}
}

// ─── Shoe helpers ───
function getShoeStats(sid){
  const shoe=state.shoes.find(s=>s.id===sid);
  const offKm=parseFloat(shoe?.manualKm)||0,offR=parseInt(shoe?.manualRuns)||0;
  const sIds=Object.entries(state.shoeMap).filter(([,s])=>s===sid).map(([a])=>a);
  const sActs=(state.stravaActivities||[]).filter(a=>sIds.includes(a.id.toString()));
  const sKm=sActs.reduce((s,a)=>s+a.distance/1000,0);
  const mLogs=(state.profile.logs||[]).filter(l=>l.shoeId===sid);
  const mKm=mLogs.reduce((s,l)=>s+Number(l.distance||0),0);
  const tk=mKm+sKm+offKm,rc=mLogs.length+sActs.length+offR;
  return{totalKm:tk,runCount:rc,avgKm:rc>0?(tk/rc).toFixed(1):'0'};
}
function handleShoePhoto(inp){
  const f=inp.files[0];if(!f)return;const r=new FileReader();
  r.onload=e=>{const img=new Image();img.onload=()=>{const c=document.createElement('canvas');const mx=300;let w=img.width,h=img.height;if(w>h){h=h*(mx/w);w=mx}else{w=w*(mx/h);h=mx}c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);state.shoeForm.photo=c.toDataURL('image/jpeg',0.7);render()};img.src=e.target.result};r.readAsDataURL(f);
}
function saveShoe(){const f=state.shoeForm;if(!f.name.trim())return;state.shoes.push({id:Date.now().toString(),name:f.name.trim(),type:f.type,photo:f.photo,retired:false,manualKm:parseFloat(f.manualKm)||0,manualRuns:parseInt(f.manualRuns)||0});SS('shoes',state.shoes);state.showShoeForm=false;render()}

// ─── Helpers ───
function timeAgo(d){const s=Math.floor((Date.now()-d)/1000);if(s<60)return'nå';if(s<3600)return`${Math.floor(s/60)}m`;if(s<86400)return`${Math.floor(s/3600)}t`;if(s<604800)return`${Math.floor(s/86400)}d`;return d.toLocaleDateString('no-NO',{day:'numeric',month:'short'})}
function getRuns(yr){return(state.stravaActivities||[]).filter(a=>(a.type==='Run'||a.type==='TrailRun')&&(!yr||new Date(a.start_date_local).getFullYear()===yr))}
function getAllYears(){const yrs=new Set();(state.stravaActivities||[]).forEach(a=>yrs.add(new Date(a.start_date_local).getFullYear()));return[...yrs].sort((a,b)=>b-a)}

// ─── Render ───
function render(){
  const ae=document.activeElement,fid=ae?.id||'',fst=ae?.selectionStart,fen=ae?.selectionEnd;
  const app=document.getElementById('app');
  if(state.authLoading){app.innerHTML='<div class="empty">Laster...</div>';return}
  if(!window.currentUser){app.innerHTML=renderAuth();return}
  if(!state.apiKey){app.innerHTML=renderApiSetup();return}
  if(state.editingProfile){app.innerHTML=renderOnboarding();return}

  app.innerHTML=`<div class="app-content">
    <div class="page ${state.tab==='home'?'active':''}">${renderDash()}</div>
    <div class="page ${state.tab==='explore'?'active':''}">${state.exploreView?renderExploreDetail():renderExplore()}</div>
    <div class="page ${state.tab==='runs'?'active':''}">${state.activeActivity?renderActivityDetail():renderRuns()}</div>
    <div class="page ${state.tab==='settings'?'active':''}">${renderSettings()}</div>
  </div>
  <nav class="tab-bar">
    ${[['home','home','Hjem'],['explore','search','Utforsk'],['runs','list','Økter'],['settings','gear','Innst.']].map(([id,ic,lb])=>`<button class="tab ${state.tab===id?'active':''}" onclick="switchTab('${id}')">${I[ic]}<span>${lb}</span></button>`).join('')}
  </nav>`;
  if(fid){const el=document.getElementById(fid);if(el){el.focus();if(typeof fst==='number'&&el.setSelectionRange)try{el.setSelectionRange(fst,fen)}catch(e){}}}
}
function switchTab(t){state.tab=t;state.exploreView=null;state.activeActivity=null;render()}

function renderAuth(){
  const m=state.authMode;
  return`<div class="auth-page"><h2>Løpestatistikk</h2><p>${m==='login'?'Logg inn':'Opprett konto'}</p>
    <div class="auth-form"><input class="auth-input" type="email" id="aEmail" placeholder="E-post"><input class="auth-input" type="password" id="aPass" placeholder="Passord">
    ${state.authError?`<div class="auth-error">${state.authError}</div>`:''}
    <button class="btn-primary" style="width:100%;justify-content:center" onclick="doAuth()">${m==='login'?'Logg inn':'Opprett'}</button></div>
    <div class="auth-switch">${m==='login'?'Ingen konto?':'Har konto?'} <button onclick="state.authMode='${m==='login'?'register':'login'}';state.authError='';render()">${m==='login'?'Opprett':'Logg inn'}</button></div></div>`}
async function doAuth(){
  const e=document.getElementById('aEmail').value.trim(),p=document.getElementById('aPass').value;
  if(!e||!p){state.authError='Fyll inn begge feltene';render();return}
  try{if(state.authMode==='login')await window.fbSignIn(window.fbAuth,e,p);else await window.fbSignUp(window.fbAuth,e,p)}
  catch(err){state.authError=err.code==='auth/invalid-credential'?'Feil e-post eller passord':err.code==='auth/email-already-in-use'?'E-posten er allerede i bruk':err.code==='auth/weak-password'?'Minst 6 tegn':'Feil: '+err.message;render()}
}

function renderApiSetup(){return`<div class="api-setup"><h2>Løpestatistikk</h2><p>Lim inn din Anthropic API-nøkkel fra <strong style="color:var(--accent)">console.anthropic.com</strong></p><input class="api-input" type="password" id="apiK" placeholder="sk-ant-..."><button class="btn-primary" onclick="let k=document.getElementById('apiK').value;if(k.startsWith('sk-')){state.apiKey=k;SS('apiKey',k);render()}">Koble til</button></div>`}

// ─── Dashboard ───
function renderDash(){
  const p=state.profile,yr=state.selectedYear,now=new Date();
  const h=now.getHours(),greet=h<12?'God morgen':h<17?'God ettermiddag':'God kveld';
  const runs=getRuns(yr),allRuns=getRuns();
  const yrs=getAllYears();if(!yrs.length)yrs.push(now.getFullYear());

  // Week stats (current year only)
  const ws=new Date(now);ws.setDate(now.getDate()-((now.getDay()+6)%7));ws.setHours(0,0,0,0);
  const weekRuns=yr===now.getFullYear()?getRuns().filter(a=>new Date(a.start_date_local)>=ws):[];
  const wKm=weekRuns.reduce((s,a)=>s+a.distance/1000,0);
  const wCnt=weekRuns.length;
  const wPace=wCnt?weekRuns.reduce((s,a)=>s+(a.distance>0?a.moving_time/60/(a.distance/1000):0),0)/wCnt:0;
  const wElev=weekRuns.reduce((s,a)=>s+(a.total_elevation_gain||0),0);

  // Year totals
  const yKm=runs.reduce((s,a)=>s+a.distance/1000,0);
  const yCnt=runs.length;
  const dayOfYr=yr===now.getFullYear()?Math.floor((now-new Date(yr,0,1))/86400000)+1:365;
  const yRpw=(yCnt/(dayOfYr/7)).toFixed(1);
  const yElev=runs.reduce((s,a)=>s+(a.total_elevation_gain||0),0);

  // Year selector
  const yrSel=`<div class="yr-sel">${yrs.map(y=>`<button class="yr-sel-btn ${y===yr?'active':''}" onclick="state.selectedYear=${y};render()">${y}</button>`).join('')}</div>`;

  // Week section
  let weekSec='';
  if(yr===now.getFullYear()){
    // Last 4 weeks data
    const w4=[];
    for(let i=3;i>=0;i--){
      const ws2=new Date(now);ws2.setDate(now.getDate()-((now.getDay()+6)%7)-i*7);ws2.setHours(0,0,0,0);
      const we2=new Date(ws2);we2.setDate(we2.getDate()+7);
      const wRuns=allRuns.filter(a=>{const d=new Date(a.start_date_local);return d>=ws2&&d<we2});
      const km=wRuns.reduce((s,a)=>s+a.distance/1000,0);
      const paceRuns=wRuns.filter(a=>a.distance>0);
      const avgPace=paceRuns.length?paceRuns.reduce((s,a)=>s+a.moving_time/60/(a.distance/1000),0)/paceRuns.length:0;
      const elev=wRuns.reduce((s,a)=>s+(a.total_elevation_gain||0),0);
      const wNum=Math.ceil((ws2-new Date(ws2.getFullYear(),0,1))/604800000)+1;
      w4.push({km,pace:avgPace,elev,label:i===0?'Nå':''+wNum});
    }
    function nFmt(v,dec=1){return dec>0?v.toFixed(dec).replace('.',','):Math.round(v).toString()}
    function eFmt(v){if(v>=1000)return(v/1000).toFixed(1).replace('.',',')+' K';return Math.round(v).toString()}
    function pFmt(p){if(!p||p<=0)return'—';const m=Math.floor(p),s=Math.round((p-m)*60).toString().padStart(2,'0');return m+':'+s}

    function miniLine(data,color,label,fmtFn,curVal){
      const max=Math.max(...data,0.001);const min=Math.min(...data);const range=max-min||1;
      const pts=data.map((v,i)=>{const x=20+i*80;const y=6+(1-(v-min)/range)*28;return`${x},${y.toFixed(0)}`}).join(' ');
      const dots=data.map((v,i)=>{const x=20+i*80;const y=6+(1-(v-min)/range)*28;return`<circle cx="${x}" cy="${y.toFixed(0)}" r="${i===3?'4.5':'3'}" fill="${color}" opacity="${i===3?'1':'0.4'}"/>`}).join('');
      const tbl=w4.map((w,i)=>`<div style="flex:1;text-align:center"><div style="font-size:9px;color:${i===3?'var(--text)':'var(--text2)'};${i===3?'font-weight:700':''}">${w.label}</div><div style="font-size:12px;font-family:'Space Mono',monospace;color:${i===3?color:'var(--text2)'};${i===3?'font-weight:700':''}">${fmtFn(data[i])}</div></div>`).join('');
      return`<div class="chart-card" style="margin-bottom:6px;padding:10px 12px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><span style="font-size:13px;font-weight:700;color:var(--text2)">${label}</span></div><svg viewBox="0 0 280 36" style="width:100%;height:36px"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>${dots}</svg><div style="display:flex;margin-top:4px;border-top:0.5px solid var(--border);padding-top:6px">${tbl}</div></div>`;
    }
    const kmData=w4.map(w=>w.km);
    const paceData=w4.map(w=>w.pace);
    const elevData=w4.map(w=>w.elev);

    weekSec=`<p class="sec-label">Denne uken</p>
    <div class="week-row">
      <div class="week-box"><div class="week-val">${nFmt(wKm)}</div><div class="week-lbl">km</div></div>
      <div class="week-box"><div class="week-val">${wCnt}</div><div class="week-lbl">økter</div></div>
      <div class="week-box"><div class="week-val">${wPace>0?pFmt(wPace):'—'}</div><div class="week-lbl">snitt /km</div></div>
      <div class="week-box"><div class="week-val">${eFmt(wElev)}</div><div class="week-lbl">stigning</div></div>
    </div>
    ${miniLine(kmData,'var(--accent)','Km per uke',v=>nFmt(v),null)}
    ${miniLine(paceData,'#ff7043','Snittempo',v=>pFmt(v),null)}
    ${miniLine(elevData,'#7F77DD','Stigning',v=>eFmt(v)+'m',null)}`;
  }

  const stravaCta=state.stravaStatus!=='connected'?`<div style="display:flex;align-items:center;gap:10px;padding:14px;background:var(--strava-glow);border:1px solid rgba(255,112,67,.2);border-radius:var(--radius-sm);color:var(--strava);cursor:pointer;font-size:13px;font-weight:600;margin-bottom:12px" onclick="switchTab('settings')">${I.strava} Koble til Strava →</div>`:'';

  return`<div class="dashboard">
    <div class="dash-top"><div><span class="greet-sub">${greet}</span><span class="greet-name">${p.name||'løper'}</span></div>${state.stravaStatus==='connected'?'<span class="badge">Strava</span>':''}</div>
    ${yrSel}${stravaCta}${weekSec}
    <div class="yr-card"><div style="font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px">Totalt ${yr}</div>
      <div class="yr-km">${Math.round(yKm)}</div><div class="yr-km-lbl">km</div>
      <div class="yr-stats"><span class="yr-stat">${yCnt}<span class="yr-stat-lbl">løp</span></span><div class="yr-div"></div><span class="yr-stat">${yRpw}<span class="yr-stat-lbl">løp/uke</span></span><div class="yr-div"></div><span class="yr-stat">${Math.round(yElev)}<span class="yr-stat-lbl">m↑</span></span></div>
    </div>
  </div>`;
}

// Volume
function renderVolume(back,runs){
  // Monthly km
  const yr=new Date().getFullYear();
  const yrRuns=runs.filter(a=>new Date(a.start_date_local).getFullYear()===yr);
  const monthly=Array(12).fill(0);
  yrRuns.forEach(a=>{monthly[new Date(a.start_date_local).getMonth()]+=a.distance/1000});
  const mMax=Math.max(...monthly,1);
  const mNames=['Jan','Feb','Mar','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Des'];
  const bars=monthly.map((km,i)=>{const h=Math.max(2,km/mMax*100);const past=i<=new Date().getMonth();return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px"><div style="font-size:9px;color:var(--text2)">${km>0?Math.round(km):''}</div><div style="width:100%;height:${h}px;border-radius:4px;background:${past?'var(--accent)':'var(--border)'};opacity:${past?1:0.3}"></div><div style="font-size:9px;color:var(--text2)">${mNames[i]}</div></div>`}).join('');

  // Weekly trend (last 12 weeks)
  const weeks=[];
  for(let i=11;i>=0;i--){
    const ws=new Date();ws.setDate(ws.getDate()-ws.getDay()+1-i*7);ws.setHours(0,0,0,0);
    const we=new Date(ws);we.setDate(we.getDate()+7);
    const wk=runs.filter(a=>{const d=new Date(a.start_date_local);return d>=ws&&d<we});
    weeks.push({km:wk.reduce((s,a)=>s+a.distance/1000,0),cnt:wk.length,label:`U${52-i}`});
  }
  const wMax=Math.max(...weeks.map(w=>w.km),1);
  const wBars=weeks.map(w=>{const h=Math.max(2,w.km/wMax*80);return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px"><div style="font-size:8px;color:var(--text2)">${w.km>0?w.km.toFixed(0):''}</div><div style="width:100%;height:${h}px;border-radius:3px;background:var(--accent);opacity:0.7"></div></div>`}).join('');

  // Frequency
  const freqWeeks=weeks.map(w=>w.cnt);
  const avgFreq=(freqWeeks.reduce((s,v)=>s+v,0)/freqWeeks.length).toFixed(1);

  return`<div class="detail-page">${back}<h2 class="detail-title">Volum</h2>
    <div class="chart-card"><div class="chart-title">Km per måned ${yr}</div><div style="display:flex;gap:4px;align-items:flex-end;height:120px;padding-top:10px">${bars}</div></div>
    <div class="chart-card"><div class="chart-title">Ukentlig km (siste 12 uker)</div><div style="display:flex;gap:3px;align-items:flex-end;height:100px;padding-top:10px">${wBars}</div></div>
    <div class="chart-card"><div class="chart-title">Treningsfrekvens</div><p style="font-size:14px;color:var(--text2)">Snitt <span style="font-size:20px;font-weight:700;color:var(--accent);font-family:'Space Mono',monospace">${avgFreq}</span> løp per uke (siste 12 uker)</p></div>
  </div>`;
}

// Tempo
function renderTempo(back,runs){
  const sorted=runs.slice().sort((a,b)=>new Date(a.start_date_local)-new Date(b.start_date_local));
  const paces=sorted.slice(-30).map(a=>{const f=fmtA(a);return{date:f.date,pace:a.distance>0?a.moving_time/60/(a.distance/1000):0}}).filter(p=>p.pace>0&&p.pace<15);
  const paceMin=Math.min(...paces.map(p=>p.pace)),paceMax=Math.max(...paces.map(p=>p.pace));
  const range=paceMax-paceMin||1;
  const dots=paces.map((p,i)=>{const x=(i/(paces.length-1)*100).toFixed(1);const y=(100-(p.pace-paceMin)/range*80-10).toFixed(1);return`<circle cx="${x}%" cy="${y}%" r="4" fill="var(--accent)" opacity="0.7"/>`}).join('');
  const line=paces.map((p,i)=>`${(i/(paces.length-1)*280).toFixed(0)},${(120-(p.pace-paceMin)/range*90-10).toFixed(0)}`).join(' ');

  // Histogram
  const allPaces=runs.map(a=>a.distance>0?a.moving_time/60/(a.distance/1000):0).filter(p=>p>3&&p<10);
  const buckets=Array(14).fill(0);
  allPaces.forEach(p=>{const b=Math.min(13,Math.max(0,Math.floor((p-3)*2)));buckets[b]++});
  const bMax=Math.max(...buckets,1);
  const histBars=buckets.map((c,i)=>{const h=Math.max(1,c/bMax*80);const label=(3+i*0.5).toFixed(1);return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px"><div style="width:100%;height:${h}px;border-radius:3px;background:var(--accent);opacity:0.6"></div><div style="font-size:8px;color:var(--text2)">${i%2===0?label:''}</div></div>`}).join('');

  return`<div class="detail-page">${back}<h2 class="detail-title">Tempo</h2>
    <div class="chart-card"><div class="chart-title">Tempoutvikling (siste 30 løp)</div><svg viewBox="0 0 280 130" style="width:100%;height:130px"><polyline points="${line}" fill="none" stroke="var(--accent)" stroke-width="2" opacity="0.5"/>${dots.replace(/cx="(\d+\.?\d*)%"/g,(m,v)=>`cx="${(v/100*280).toFixed(0)}"`)?.replace(/cy="(\d+\.?\d*)%"/g,(m,v)=>`cy="${(v/100*130).toFixed(0)}"`)}</svg></div>
    <div class="chart-card"><div class="chart-title">Tempofordeling (min/km)</div><div style="display:flex;gap:2px;align-items:flex-end;height:100px">${histBars}</div></div>
  </div>`;
}

// Pulse
function renderPulse(back,runs){
  const hrRuns=runs.filter(a=>a.average_heartrate);
  // Zone distribution
  const zones=[0,0,0,0,0];
  hrRuns.forEach(a=>{const hr=a.average_heartrate;if(hr<125)zones[0]++;else if(hr<140)zones[1]++;else if(hr<155)zones[2]++;else if(hr<170)zones[3]++;else zones[4]++});
  const zTotal=zones.reduce((s,v)=>s+v,1);
  const zColors=['#00c9a7','#4dd0e1','#ffd54f','#ff7043','#ef4444'];
  const zNames=['Sone 1','Sone 2','Sone 3','Sone 4','Sone 5'];
  const zBars=zones.map((z,i)=>{const pct=Math.round(z/zTotal*100);return`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span style="font-size:12px;color:var(--text2);min-width:45px">${zNames[i]}</span><div style="flex:1;height:14px;border-radius:4px;background:var(--border);overflow:hidden"><div style="height:100%;width:${pct}%;border-radius:4px;background:${zColors[i]}"></div></div><span style="font-size:12px;color:var(--text2);min-width:30px;text-align:right">${pct}%</span></div>`}).join('');

  // HR vs pace scatter
  const scatter=hrRuns.slice(-40).map(a=>{const pace=a.distance>0?a.moving_time/60/(a.distance/1000):0;return{hr:a.average_heartrate,pace}}).filter(p=>p.pace>3&&p.pace<10);
  const hrMin=Math.min(...scatter.map(p=>p.hr))-5,hrMax=Math.max(...scatter.map(p=>p.hr))+5;
  const pMin=Math.min(...scatter.map(p=>p.pace))-0.5,pMax=Math.max(...scatter.map(p=>p.pace))+0.5;
  const sDots=scatter.map(p=>{const x=((p.hr-hrMin)/(hrMax-hrMin)*260+10).toFixed(0);const y=(110-(p.pace-pMin)/(pMax-pMin)*90-10).toFixed(0);return`<circle cx="${x}" cy="${y}" r="4" fill="var(--accent)" opacity="0.5"/>`}).join('');

  // Avg HR trend
  const sorted=hrRuns.slice().sort((a,b)=>new Date(a.start_date_local)-new Date(b.start_date_local)).slice(-20);
  const hrTrend=sorted.map((a,i)=>`${(i/(sorted.length-1)*260+10).toFixed(0)},${(110-(a.average_heartrate-hrMin)/(hrMax-hrMin)*90-10).toFixed(0)}`).join(' ');

  return`<div class="detail-page">${back}<h2 class="detail-title">Puls</h2>
    <div class="chart-card"><div class="chart-title">Sonefordeling</div>${zBars}</div>
    <div class="chart-card"><div class="chart-title">Snittpuls over tid (siste 20)</div><svg viewBox="0 0 280 120" style="width:100%;height:120px"><polyline points="${hrTrend}" fill="none" stroke="var(--accent)" stroke-width="2"/></svg></div>
    <div class="chart-card"><div class="chart-title">Puls vs. tempo</div><svg viewBox="0 0 280 120" style="width:100%;height:120px">${sDots}<text x="140" y="118" text-anchor="middle" fill="var(--text2)" font-size="10">Puls →</text></svg></div>
  </div>`;
}

// Records detail
function renderRecords(back,runs){
  function findAll(minD,maxD){
    return runs.filter(a=>{const km=a.distance/1000;return km>=minD&&km<=maxD}).sort((a,b)=>a.moving_time-b.moving_time).slice(0,5);
  }
  function formatTime(sec){const m=Math.floor(sec/60),s=sec%60;return m>=60?`${Math.floor(m/60)}:${(m%60).toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`:`${m}:${s.toString().padStart(2,'0')}`}
  function renderPRList(label,list){
    if(!list.length)return'';
    return`<div class="chart-card"><div class="chart-title">${label}</div>${list.map((a,i)=>{
      const f=fmtA(a),shoe=state.shoeMap[a.id]?state.shoes.find(s=>s.id===state.shoeMap[a.id]):null;
      return`<div style="display:flex;align-items:center;gap:10px;padding:6px 0;${i<list.length-1?'border-bottom:0.5px solid var(--border)':''}"><span style="font-weight:700;color:var(--accent);min-width:20px">${i+1}.</span><span style="font-size:15px;font-weight:700;font-family:'Space Mono',monospace">${formatTime(a.moving_time)}</span><span style="flex:1;font-size:12px;color:var(--text2)">${f.date}${shoe?' · 👟 '+shoe.name:''}</span></div>`}).join('')}</div>`;
  }
  return`<div class="detail-page">${back}<h2 class="detail-title">Rekorder</h2>
    ${renderPRList('5 km',findAll(4.8,5.5))}
    ${renderPRList('10 km',findAll(9.5,11))}
    ${renderPRList('Halvmaraton',findAll(21.1,22.5))}
  </div>`;
}

// Shoe stats
function renderShoeStats(back){
  const shoes=state.shoes;
  const runs=(state.stravaActivities||[]).filter(a=>a.type==='Run'||a.type==='TrailRun');

  // Longest total km
  const byKm=shoes.map(s=>({...s,stats:getShoeStats(s.id)})).sort((a,b)=>b.stats.totalKm-a.stats.totalKm);
  // Longest single run per shoe
  const longestRun=shoes.map(s=>{
    const sIds=Object.entries(state.shoeMap).filter(([,sid])=>sid===s.id).map(([aid])=>aid);
    const sRuns=runs.filter(a=>sIds.includes(a.id.toString()));
    const best=sRuns.length?sRuns.sort((a,b)=>b.distance-a.distance)[0]:null;
    return{shoe:s,km:best?(best.distance/1000).toFixed(1):0,name:best?best.name||'':''};
  }).filter(r=>r.km>0).sort((a,b)=>b.km-a.km);
  // Fastest shoe (avg pace)
  const fastest=shoes.map(s=>{
    const sIds=Object.entries(state.shoeMap).filter(([,sid])=>sid===s.id).map(([aid])=>aid);
    const sRuns=runs.filter(a=>sIds.includes(a.id.toString())&&a.distance>0);
    if(!sRuns.length)return null;
    const avgPace=sRuns.reduce((s,a)=>s+a.moving_time/60/(a.distance/1000),0)/sRuns.length;
    const pm=Math.floor(avgPace),ps=Math.round((avgPace-pm)*60).toString().padStart(2,'0');
    return{shoe:s,pace:`${pm}:${ps}`,raw:avgPace};
  }).filter(Boolean).sort((a,b)=>a.raw-b.raw);
  // Most runs
  const mostRuns=shoes.map(s=>({shoe:s,stats:getShoeStats(s.id)})).sort((a,b)=>b.stats.runCount-a.stats.runCount);
  // Most elevation
  const mostElev=shoes.map(s=>{
    const sIds=Object.entries(state.shoeMap).filter(([,sid])=>sid===s.id).map(([aid])=>aid);
    const sRuns=runs.filter(a=>sIds.includes(a.id.toString()));
    const elev=sRuns.reduce((sum,a)=>sum+(a.total_elevation_gain||0),0);
    return{shoe:s,elev:Math.round(elev)};
  }).filter(r=>r.elev>0).sort((a,b)=>b.elev-a.elev);

  const te=s=>`${s.type==='Asfalt'?'🛣️':s.type==='Konkurranse'?'🏁':s.type==='Terreng'?'⛰️':'🧊'}`;
  function renderRanking(title,items,valFn){
    if(!items.length)return'';
    return`<div class="chart-card"><div class="chart-title">${title}</div>${items.slice(0,5).map((item,i)=>`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;${i<Math.min(items.length,5)-1?'border-bottom:0.5px solid var(--border)':''}"><span style="font-weight:700;color:var(--accent);min-width:20px;font-family:'Space Mono',monospace">${i+1}.</span><span style="font-size:14px">${te(item.shoe||item)} ${(item.shoe||item).name}</span><span style="margin-left:auto;font-weight:700;font-family:'Space Mono',monospace;color:var(--accent)">${valFn(item)}</span></div>`).join('')}</div>`;
  }

  return`<div class="detail-page">${back}<h2 class="detail-title">Sko</h2>
    ${renderRanking('Lengste totaldistanse',byKm,i=>i.stats.totalKm.toFixed(0)+' km')}
    ${renderRanking('Lengste enkeltløp',longestRun,i=>i.km+' km')}
    ${renderRanking('Raskeste sko (snittempo)',fastest,i=>i.pace+' /km')}
    ${renderRanking('Flest løp',mostRuns,i=>i.stats.runCount+' løp')}
    ${renderRanking('Mest total stigning',mostElev,i=>i.elev+' m')}
  </div>`;
}

// Elevation
function renderElevation(back,runs){
  const yr=new Date().getFullYear();
  const yrRuns=runs.filter(a=>new Date(a.start_date_local).getFullYear()===yr);
  const monthly=Array(12).fill(0);
  yrRuns.forEach(a=>{monthly[new Date(a.start_date_local).getMonth()]+=(a.total_elevation_gain||0)});
  const mMax=Math.max(...monthly,1);
  const mNames=['Jan','Feb','Mar','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Des'];
  const bars=monthly.map((e,i)=>{const h=Math.max(1,e/mMax*100);const past=i<=new Date().getMonth();return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px"><div style="font-size:8px;color:var(--text2)">${e>0?Math.round(e):''}</div><div style="width:100%;height:${h}px;border-radius:4px;background:${past?'var(--accent)':'var(--border)'};opacity:${past?1:0.3}"></div><div style="font-size:9px;color:var(--text2)">${mNames[i]}</div></div>`}).join('');

  const road=runs.filter(a=>a.type==='Run').length;
  const trail=runs.filter(a=>a.type==='TrailRun').length;
  const tot=road+trail||1;

  return`<div class="detail-page">${back}<h2 class="detail-title">Stigning</h2>
    <div class="chart-card"><div class="chart-title">Stigning per måned ${yr} (m)</div><div style="display:flex;gap:4px;align-items:flex-end;height:120px;padding-top:10px">${bars}</div></div>
    <div class="chart-card"><div class="chart-title">Asfalt vs. terreng</div>
      <div style="display:flex;align-items:center;gap:16px">
        <div style="flex:1;height:16px;border-radius:8px;overflow:hidden;display:flex"><div style="width:${Math.round(road/tot*100)}%;background:var(--accent)"></div><div style="width:${Math.round(trail/tot*100)}%;background:var(--strava)"></div></div>
      </div>
      <div style="display:flex;gap:16px;margin-top:8px;font-size:12px;color:var(--text2)"><span>🛣️ Asfalt ${Math.round(road/tot*100)}%</span><span>⛰️ Terreng ${Math.round(trail/tot*100)}%</span></div>
    </div>
  </div>`;
}

// ─── Økter ───
function renderRuns(){
  const runs=getRuns(state.selectedYear);
  const shoes=state.shoes.filter(s=>!s.retired);
  const shoeOpts=shoes.length?`<option value="">👟 —</option>${shoes.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}`:'';
  return`<div class="detail-page"><h2 class="detail-title">Økter ${state.selectedYear}</h2>
    <div style="display:flex;flex-direction:column;gap:6px">${runs.length?runs.map(a=>{
      const f=fmtA(a),hard=f.hr&&f.hr>155;
      const shoe=state.shoeMap[a.id]?state.shoes.find(s=>s.id===state.shoeMap[a.id]):null;
      const shoeHtml=shoe?`<span style="font-size:11px;color:var(--text2)">👟 ${shoe.name}</span>`:(shoes.length?`<select class="feel-btn" style="padding:4px 8px;font-size:11px;width:auto" onclick="event.stopPropagation()" onchange="state.shoeMap['${a.id}']=this.value;SS('shoeMap',state.shoeMap);render()">${shoeOpts}</select>`:'');
      return`<div class="ri ${hard?'hard':''}" style="cursor:pointer" onclick="openActivity('${a.id}')"><div style="flex:1"><div class="ri-name">${f.name}</div><div class="ri-stats">${f.km} km · ${f.pace} /km${f.hr?' · ♥ '+f.hr:''}</div>${shoeHtml?`<div style="margin-top:4px">${shoeHtml}</div>`:''}</div><span class="ri-ago">${f.date}</span></div>`}).join(''):'<div class="empty">Ingen økter dette året</div>'}</div>
  </div>`;
}
function openActivity(id){
  const a=(state.stravaActivities||[]).find(a=>a.id.toString()===id.toString());
  if(a){state.activeActivity=a;render()}
}
function renderActivityDetail(){
  const a=state.activeActivity,f=fmtA(a);
  const shoe=state.shoeMap[a.id]?state.shoes.find(s=>s.id===state.shoeMap[a.id]):null;
  let stats=`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px">`;
  [[f.km,'km'],[f.mins,'minutter'],[f.pace,'min/km']].forEach(([v,l])=>{stats+=`<div style="background:var(--surface);border:0.5px solid var(--border);border-radius:10px;padding:14px;text-align:center"><div style="font-size:20px;font-weight:700;font-family:'Space Mono',monospace;color:var(--accent)">${v}</div><div style="font-size:10px;color:var(--text2);text-transform:uppercase;margin-top:2px">${l}</div></div>`});
  if(f.hr)stats+=`<div style="background:var(--surface);border:0.5px solid var(--border);border-radius:10px;padding:14px;text-align:center"><div style="font-size:20px;font-weight:700;font-family:'Space Mono',monospace;color:var(--accent)">${f.hr}</div><div style="font-size:10px;color:var(--text2);text-transform:uppercase;margin-top:2px">snitt puls</div></div>`;
  if(f.maxHr)stats+=`<div style="background:var(--surface);border:0.5px solid var(--border);border-radius:10px;padding:14px;text-align:center"><div style="font-size:20px;font-weight:700;font-family:'Space Mono',monospace;color:var(--accent)">${f.maxHr}</div><div style="font-size:10px;color:var(--text2);text-transform:uppercase;margin-top:2px">maks puls</div></div>`;
  if(f.elev)stats+=`<div style="background:var(--surface);border:0.5px solid var(--border);border-radius:10px;padding:14px;text-align:center"><div style="font-size:20px;font-weight:700;font-family:'Space Mono',monospace;color:var(--accent)">${f.elev}m</div><div style="font-size:10px;color:var(--text2);text-transform:uppercase;margin-top:2px">stigning</div></div>`;
  stats+=`</div>`;
  return`<div class="detail-page">
    <button class="back-btn" onclick="state.activeActivity=null;render()">← Tilbake</button>
    <h2 class="detail-title">${f.name}</h2>
    <p style="font-size:13px;color:var(--text2);margin:-10px 0 16px">${f.date}</p>
    ${stats}
    ${shoe?`<p style="font-size:14px;color:var(--text2);margin-bottom:12px">👟 ${shoe.name}</p>`:''}
    <a href="https://www.strava.com/activities/${a.id}" target="_blank" style="display:inline-flex;align-items:center;gap:6px;color:var(--strava);font-size:14px;font-weight:600;text-decoration:none;padding:10px 16px;background:var(--strava-glow);border-radius:var(--radius-sm)">${I.strava} Se på Strava</a>
  </div>`;
}

// ─── Settings ───
function renderSettings(){
  const p=state.profile;
  const ss=state.stravaStatus;
  const statusHtml=ss==='connected'?`<div class="strava-status ok">${I.check} Koblet til Strava</div>`:ss==='error'?`<div class="strava-status err">⚠️ Tilkobling feilet</div>`:'';
  const email=window.currentUser?.email||'';

  return`<div class="settings"><h2 class="settings-title">Innstillinger</h2>
    ${email?`<p style="font-size:13px;color:var(--text2);margin:-16px 0 16px">${email}</p>`:''}
    <button class="settings-row" onclick="state.editingProfile=true;state.onboardingStep=0;state.onboardingForm={...state.profile};render()">
      ${I.user}<div><div class="s-title">Rediger profil</div><div class="s-sub">${p.name||'Ikke satt opp'}</div></div><span class="s-arrow">→</span>
    </button>
    <button class="settings-row" onclick="state.tab='explore';state.exploreView='shoes';render()">
      👟<div><div class="s-title">Administrer sko</div><div class="s-sub">${state.shoes.length} sko registrert</div></div><span class="s-arrow">→</span>
    </button>
    <div class="strava-setup">
      <div class="strava-hdr"><span class="strava-logo">${I.strava}</span><h3>Strava</h3>${state.stravaStatus==='connected'?`<button style="margin-left:auto;background:none;border:none;color:var(--text2);cursor:pointer" onclick="stravaRefresh()">${I.refresh}</button>`:''}</div>
      ${statusHtml}
      <div style="font-size:13px;color:var(--text2);margin-bottom:12px">
        <div class="guide-step"><span class="step-num">1</span><span>Gå til <strong>strava.com/settings/api</strong></span></div>
        <div class="guide-step"><span class="step-num">2</span><span>Kopier <strong>Client ID</strong> og <strong>Client Secret</strong></span></div>
        <div class="guide-step"><span class="step-num">3</span><span>Åpne autorisasjonslenken og kopier koden</span></div>
      </div>
      <div class="strava-form">
        <label>Client ID</label><input id="sCI" placeholder="12345" value="${state.stravaCreds.clientId||''}">
        <label>Client Secret</label><input id="sCS" type="password" placeholder="abc123..." value="${state.stravaCreds.clientSecret||''}">
        <label>Autorisasjonskode</label><input id="sCd" placeholder="Koden fra URL-en">
        <button class="btn-strava" onclick="stravaConnect({clientId:document.getElementById('sCI').value,clientSecret:document.getElementById('sCS').value,code:document.getElementById('sCd').value})">Koble til Strava</button>
      </div>
    </div>
    <button class="logout-btn" onclick="if(confirm('Logge ut?'))window.fbSignOut(window.fbAuth)">Logg ut</button>
    <button class="reset-btn" onclick="if(confirm('Slette alt?')){localStorage.clear();location.reload()}">Nullstill alt</button>
  </div>`;
}

// ─── Onboarding (profile edit) ───
const OB_STEPS=[
  {key:'name',label:'Hva heter du?',type:'text',ph:'Navnet ditt'},
  {key:'age',label:'Alder?',type:'number',ph:'Alder'},
  {key:'experience',label:'Løpeerfaring?',type:'select',opts:['Nybegynner (0–6 mnd)','Litt erfaring (6–24 mnd)','Erfaren (2–5 år)','Veteran (5+ år)']},
  {key:'fitness',label:'Nåværende form?',type:'select',opts:['Lav','Middels','God','Veldig god']},
  {key:'weeklyKm',label:'Km per uke nå?',type:'number',ph:'F.eks. 20'},
  {key:'injuries',label:'Skader/begrensninger?',type:'text',ph:"F.eks. vondt kne eller 'ingen'"},
];
function renderOnboarding(){
  const s=state.onboardingStep,c=OB_STEPS[s],f=state.onboardingForm,v=f[c.key]||'';
  const dots=OB_STEPS.map((_,i)=>`<div class="ob-dot ${i<=s?'on':''}"></div>`).join('');
  let inp='';
  if(c.type==='select')inp=`<div class="ob-opts">${c.opts.map(o=>`<button class="ob-opt ${v===o?'sel':''}" onclick="state.onboardingForm['${c.key}']='${o}';render()">${o}</button>`).join('')}</div>`;
  else inp=`<input class="ob-input" id="ob-in" type="${c.type}" placeholder="${c.ph}" value="${v}" oninput="state.onboardingForm['${c.key}']=this.value">`;
  const back=s>0?`<button class="btn-secondary" onclick="state.onboardingStep--;render()">Tilbake</button>`:'';
  const next=s<OB_STEPS.length-1?`<button class="btn-primary" ${!v?'disabled':''} onclick="state.onboardingStep++;render()">Neste</button>`:`<button class="btn-primary" ${!v?'disabled':''} onclick="state.profile={...state.profile,...state.onboardingForm};SS('profile',state.profile);state.profileDone=true;SS('profileDone',true);state.editingProfile=false;state.onboardingStep=0;state.onboardingForm={};render()">Lagre</button>`;
  return`<div style="padding:60px 24px;min-height:100vh;display:flex;flex-direction:column;justify-content:center"><div class="ob-dots">${dots}</div><h2 class="ob-label">${c.label}</h2>${inp}<div class="ob-nav">${back}${next}</div></div>`;
}

render();
</script>
<script>if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(e=>console.log('SW:',e))</script>
